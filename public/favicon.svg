<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Градиент неба: от глубокой ночи к горизонту -->
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="40%" stop-color="#081a3a"/>
      <stop offset="70%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#2d5a7b"/>
    </linearGradient>

    <!-- Свечение луны -->
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f8f9fa" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#e2e8f0" stop-opacity="0.4"/>
      <stop offset="70%" stop-color="#cbd5e1" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#94a3b8" stop-opacity="0"/>
    </radialGradient>

    <!-- Градиент кроны дерева -->
    <radialGradient id="leafGradient" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#81c784"/>
      <stop offset="30%" stop-color="#66bb6a"/>
      <stop offset="60%" stop-color="#2e7d32"/>
      <stop offset="100%" stop-color="#1b5e20"/>
    </radialGradient>

    <!-- Текстура коры -->
    <pattern id="barkTexture" width="8" height="20" patternUnits="userSpaceOnUse">
      <rect width="8" height="20" fill="#6d4c41"/>
      <path d="M2 0 L2.5 20 M5 0 L4.5 20 M7 0 L7.5 20" stroke="#4e342e" stroke-width="0.5" opacity="0.4"/>
    </pattern>

    <!-- Свечение для звёзд -->
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Тень для дерева -->
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.3"/>
    </filter>

    <!-- Градиент земли -->
    <linearGradient id="groundGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0f1720"/>
    </linearGradient>
  </defs>

  <!-- Ночное небо с градиентом -->
  <rect width="400" height="400" fill="url(#skyGradient)"/>

  <!-- Далекие горы (силуэт) -->
  <g fill="#0a1428" opacity="0.6">
    <polygon points="0,280 80,240 160,270 240,230 320,260 400,240 400,400 0,400"/>
  </g>

  <!-- Луна с сиянием -->
  <g id="moon">
    <circle cx="320" cy="70" r="35" fill="url(#moonGlow)"/>
    <circle cx="320" cy="70" r="18" fill="#f1f5f9"/>
    <circle cx="315" cy="65" r="4" fill="#cbd5e1" opacity="0.5"/>
    <circle cx="328" cy="75" r="3" fill="#cbd5e1" opacity="0.4"/>
    <circle cx="318" cy="78" r="2.5" fill="#cbd5e1" opacity="0.3"/>
  </g>

  <!-- Облака с медленным движением -->
  <g opacity="0.15" fill="#e2e8f0">
    <ellipse cx="60" cy="50" rx="25" ry="12">
      <animate attributeName="cx" values="60;70;60" dur="40s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="75" cy="48" rx="20" ry="10">
      <animate attributeName="cx" values="75;85;75" dur="40s" repeatCount="indefinite"/>
    </ellipse>
    
    <ellipse cx="200" cy="90" rx="30" ry="14">
      <animate attributeName="cx" values="200;215;200" dur="50s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="220" cy="88" rx="22" ry="11">
      <animate attributeName="cx" values="220;235;220" dur="50s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Звёзды с мерцанием и свечением -->
  <g filter="url(#starGlow)">
    <!-- Яркие звёзды -->
    <g fill="#fff9c4">
      <circle cx="40" cy="30" r="2">
        <animate attributeName="r" values="2;2.8;2" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="120" cy="50" r="2.2">
        <animate attributeName="r" values="2.2;3;2.2" dur="2.7s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0.4;1" dur="2.7s" repeatCount="indefinite"/>
      </circle>
      <circle cx="280" cy="40" r="2.5">
        <animate attributeName="r" values="2.5;3.5;2.5" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0.3;1" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="360" cy="100" r="2">
        <animate attributeName="r" values="2;2.6;2" dur="3.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0.5;1" dur="3.2s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <!-- Средние звёзды -->
    <g fill="#e3f2fd">
      <circle cx="90" cy="20" r="1.4">
        <animate attributeName="opacity" values="1;0.3;1" dur="2.1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="180" cy="35" r="1.3">
        <animate attributeName="opacity" values="1;0.4;1" dur="2.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="240" cy="60" r="1.5">
        <animate attributeName="opacity" values="1;0.2;1" dur="3.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="340" cy="45" r="1.4">
        <animate attributeName="opacity" values="1;0.5;1" dur="2.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="50" cy="120" r="1.2">
        <animate attributeName="opacity" values="1;0.3;1" dur="2.9s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <!-- Мелкие звёзды (фон) -->
    <g fill="#bbdefb" opacity="0.7">
      <circle cx="25" cy="80" r="0.8"/>
      <circle cx="70" cy="140" r="0.9"/>
      <circle cx="150" cy="100" r="0.7"/>
      <circle cx="200" cy="130" r="0.8"/>
      <circle cx="260" cy="90" r="0.9"/>
      <circle cx="310" cy="150" r="0.7"/>
      <circle cx="370" cy="70" r="0.8"/>
      <circle cx="100" cy="180" r="0.8"/>
      <circle cx="350" cy="200" r="0.7"/>
      <circle cx="160" cy="220" r="0.9"/>
    </g>
  </g>

  <!-- Светящиеся светлячки -->
  <g fill="#fff59d">
    <circle cx="80" cy="280" r="2" opacity="0.9">
      <animate attributeName="cy" values="280;270;285;280" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="80;85;82;80" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="320" cy="300" r="1.8" opacity="0.8">
      <animate attributeName="cy" values="300;310;295;300" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="320;315;322;320" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="180" cy="320" r="2.2" opacity="0.85">
      <animate attributeName="cy" values="320;310;325;320" dur="5.5s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="180;175;183;180" dur="5.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;0.25;0.85" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Земля/трава -->
  <rect x="0" y="320" width="400" height="80" fill="url(#groundGradient)"/>
  
  <!-- Трава на переднем плане -->
  <g fill="#2e4a3d" opacity="0.8">
    <path d="M20 320 Q25 305 30 320 L30 400 L20 400 Z"/>
    <path d="M45 320 Q52 300 60 320 L60 400 L45 400 Z"/>
    <path d="M340 320 Q345 308 350 320 L350 400 L340 400 Z"/>
    <path d="M370 320 Q378 302 385 320 L385 400 L370 400 Z"/>
  </g>

  <!-- Тень от дерева -->
  <ellipse cx="200" cy="335" rx="45" ry="12" fill="#0a0f1a" opacity="0.4" filter="url(#softShadow)"/>

  <!-- Ствол дерева с текстурой коры -->
  <g filter="url(#softShadow)">
    <rect x="185" y="260" width="30" height="65" fill="url(#barkTexture)" rx="3"/>
    <!-- Детали коры -->
    <g stroke="#4e342e" stroke-width="0.8" fill="none" opacity="0.5">
      <path d="M190 270 Q192 280 190 290"/>
      <path d="M200 265 Q198 275 201 285"/>
      <path d="M210 275 Q212 285 210 295"/>
      <path d="M195 300 Q193 310 196 320"/>
    </g>
    <!-- Веточки на стволе -->
    <path d="M215 280 Q225 275 230 270" stroke="#6d4c41" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M185 295 Q175 290 170 288" stroke="#6d4c41" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Корни -->
  <g fill="#5d4037">
    <ellipse cx="200" cy="328" rx="25" ry="8"/>
    <path d="M175 325 Q165 330 160 335 L162 338 Q170 332 180 330 Z"/>
    <path d="M225 325 Q235 330 240 335 L238 338 Q230 332 220 330 Z"/>
  </g>

  <!-- Пышная крона дерева с многослойностью -->
  <g filter="url(#softShadow)">
    <!-- Задний слой кроны -->
    <g fill="#1b5e20" opacity="0.9">
      <circle cx="200" cy="230" r="35"/>
      <circle cx="170" cy="245" r="28"/>
      <circle cx="230" cy="245" r="28"/>
      <circle cx="185" cy="210" r="25"/>
      <circle cx="215" cy="210" r="25"/>
    </g>
    
    <!-- Средний слой кроны с градиентом -->
    <g fill="url(#leafGradient)">
      <circle cx="200" cy="220" r="40"/>
      <circle cx="165" cy="235" r="32"/>
      <circle cx="235" cy="235" r="32"/>
      <circle cx="180" cy="200" r="28"/>
      <circle cx="220" cy="200" r="28"/>
      <circle cx="200" cy="185" r="26"/>
      <circle cx="190" cy="170" r="22"/>
      <circle cx="210" cy="170" r="22"/>
    </g>
    
    <!-- Передний слой: светлые акценты -->
    <g fill="#81c784" opacity="0.5">
      <circle cx="195" cy="215" r="15"/>
      <circle cx="210" cy="225" r="12"/>
      <circle cx="185" cy="230" r="10"/>
      <circle cx="200" cy="195" r="13"/>
    </g>
  </g>

  <!-- Лунный свет, падающий на крону -->
  <ellipse cx="215" cy="200" rx="25" ry="35" fill="url(#moonGlow)" opacity="0.3" transform="rotate(-15 215 200)"/>

  <!-- Падающие листья (анимация) -->
  <g fill="#a5d6a7" opacity="0.7">
    <ellipse cx="150" cy="200" rx="4" ry="2" transform="rotate(30 150 200)">
      <animate attributeName="cy" values="200;220;240;260" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="150;145;152;148" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="8s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="250" cy="180" rx="3.5" ry="1.8" transform="rotate(-20 250 180)">
      <animate attributeName="cy" values="180;200;220;240" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="250;255;248;252" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="9s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Туман у земли -->
  <g fill="#94a3b8" opacity="0.08">
    <ellipse cx="100" cy="315" rx="60" ry="20"/>
    <ellipse cx="300" cy="318" rx="70" ry="22"/>
    <ellipse cx="200" cy="322" rx="50" ry="15"/>
  </g>

  <!-- Подсветка от луны на земле -->
  <ellipse cx="320" cy="330" rx="80" ry="25" fill="#e2e8f0" opacity="0.05"/>
</svg>